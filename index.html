<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CarreiraMais — Plataforma de Recomendação de Cursos e Conexão Profissional</title>
  <meta name="description" content="Plataforma gratuita de recomendação de cursos e conexão profissional. Conectando formação, habilidades e oportunidades.">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- CSS -->
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/navbar.css">
  <link rel="stylesheet" href="css/home.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="css/modal.css">
  <link rel="stylesheet" href="css/dark-theme.css">
  <link rel="stylesheet" href="css/visual-cyberpunk.css">
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <nav id="navbar">
    <div class="nav-inner">
      <a href="#home" class="nav-logo" onclick="closeMenu()">
        <i class="fa-solid fa-rocket"></i> CarreiraMais
      </a>

      <ul class="nav-links">
        <li><a href="#home"    data-nav="home"    onclick="closeMenu()">Home</a></li>
        <li><a href="#cursos"  data-nav="cursos"  onclick="closeMenu()">Cursos</a></li>
        <li><a href="#vagas"   data-nav="vagas"   onclick="closeMenu()">Vagas</a></li>
        <li><a href="#sobre"   data-nav="sobre"   onclick="closeMenu()">Sobre</a></li>
      </ul>

      <div class="nav-auth" id="nav-auth">
        <!-- Filled by app.js -->
      </div>

      <button class="dark-toggle" onclick="toggleDark()" title="Alternar tema">
        <i class="fa-solid fa-moon"></i>
      </button>

      <button class="hamburger" id="hamburger" onclick="toggleMenu()" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- Mobile nav -->
  <div class="nav-mobile" id="nav-mobile">
    <a href="#home"    data-nav="home"    onclick="closeMenu()"><i class="fa-solid fa-house"></i> Home</a>
    <a href="#cursos"  data-nav="cursos"  onclick="closeMenu()"><i class="fa-solid fa-graduation-cap"></i> Cursos</a>
    <a href="#vagas"   data-nav="vagas"   onclick="closeMenu()"><i class="fa-solid fa-briefcase"></i> Vagas</a>
    <a href="#sobre"   data-nav="sobre"   onclick="closeMenu()"><i class="fa-solid fa-info-circle"></i> Sobre</a>
    <div class="divider"></div>
    <div class="nav-mobile-auth" id="nav-mobile-auth">
      <!-- Filled by app.js -->
    </div>
  </div>

  <!-- ===== PAGE CONTAINER (SPA) ===== -->
  <div id="page-container"></div>

  <!-- ===== TOAST CONTAINER ===== -->
  <div id="toast-container"></div>

  <!-- ===== SCRIPTS (order matters) ===== -->
  <!-- 1. Data -->
  <script src="js/data.js"></script>

  <!-- 2. Core utilities -->
  <script src="js/app.js"></script>
  <script src="js/modal.js"></script>

  <!-- 3. Pages -->
  <script src="js/pages/home.js"></script>
  <script src="js/pages/login.js"></script>
  <script src="js/pages/cadastro.js"></script>
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/empresa.js"></script>
  <script src="js/pages/cursos.js"></script>
  <script src="js/pages/vagas.js"></script>
  <script src="js/pages/sobre.js"></script>

  <!-- 4. Router (last — depends on all page functions) -->
  <script src="js/router.js"></script>

</body>
</html>
